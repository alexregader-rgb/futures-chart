<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Фьючерсы — график</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  body { margin:0; font-family:Arial,sans-serif; background:#131722; color:#d1d4dc; }
  .top { padding:10px; display:flex; gap:10px; align-items:center; background:#1e222d; }
  select, button { background:#2a2e39; color:#d1d4dc; border:1px solid #363a45; padding:6px 10px; border-radius:4px; }
  #chart { width:100%; height:calc(100vh - 50px); }
  .price { font-size:18px; font-weight:bold; margin-left:auto; }
</style>
</head>
<body>
<div class="top">
  <select id="selector"><option>Загрузка...</option></select>
  <select id="interval">
    <option value="1m">1 мин</option>
    <option value="5m" selected>5 мин</option>
    <option value="15m">15 мин</option>
    <option value="1h">1 час</option>
    <option value="1d">1 день</option>
  </select>
  <span class="price" id="price">—</span>
</div>
<div id="chart"></div>

<script>
// ====== НАСТРОЙКА КАСТОМНЫХ УРОВНЕЙ ======
// Меняйте цены и подписи под свои нужды
const CUSTOM_LEVELS = [
  { price: 100000, color: "#ff9800", label: "Сопротивление" },
  { price:  95000, color: "#2196f3", label: "Поддержка" },
  { price:  97500, color: "#e91e63", label: "Пивот" },
];
// ==========================================

const chart = LightweightCharts.createChart(
  document.getElementById("chart"),
  {
    layout: { background:{color:"#131722"}, textColor:"#d1d4dc" },
    grid: { vertLines:{color:"#1e222d"}, horzLines:{color:"#1e222d"} },
    timeScale: { timeVisible:true, secondsVisible:false },
    crosshair: { mode: 0 },
  }
);
const series = chart.addCandlestickSeries({
  upColor:"#26a69a", downColor:"#ef5350",
  borderVisible:false, wickUpColor:"#26a69a", wickDownColor:"#ef5350",
});

// Рисуем кастомные уровни
let priceLines = [];
function drawLevels() {
  priceLines.forEach(l => series.removePriceLine(l));
  priceLines = CUSTOM_LEVELS.map(lv => series.createPriceLine({
    price: lv.price, color: lv.color, lineWidth: 2,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    axisLabelVisible: true, title: lv.label,
  }));
}
drawLevels();

let currentFigi = null;
let ws = null;

// Загрузка списка фьючерсов
fetch("/futures").then(r => r.json()).then(list => {
  const sel = document.getElementById("selector");
  sel.innerHTML = "";
  list.forEach(f => {
    const opt = document.createElement("option");
    opt.value = f.figi;
    opt.textContent = `${f.ticker} — ${f.name}`;
    sel.appendChild(opt);
  });
  // По умолчанию — Si (доллар/рубль), если есть
  const si = list.find(f => f.ticker.startsWith("Si"));
  if (si) sel.value = si.figi;
  loadChart();
});

async function loadChart() {
  const figi = document.getElementById("selector").value;
  const interval = document.getElementById("interval").value;
  currentFigi = figi;
  const r = await fetch(`/history/${figi}?interval=${interval}`);
  const data = await r.json();
  series.setData(data.candles);
  chart.timeScale().fitContent();
  connectWs();
}

function connectWs() {
  if (ws) ws.close();
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => ws.send(JSON.stringify({ action:"subscribe", figi: currentFigi }));
  ws.onmessage = (ev) => {
    const c = JSON.parse(ev.data);
    series.update({ time:c.time, open:c.open, high:c.high, low:c.low, close:c.close });
    document.getElementById("price").textContent = c.close.toFixed(2);
  };
}

document.getElementById("selector").onchange = loadChart;
document.getElementById("interval").onchange = loadChart;
</script>
</body>
</html>
